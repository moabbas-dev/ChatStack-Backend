openapi: 3.0.0
info:
  title: ChatStack API
  version: "1.0"
  description: Chatting Platform

tags:
  - name: Users Management
    description: Methods Related to users
  - name: Authentication Flow
    description: Methods Related to Authentication

servers:
  - url: /chat/stack/api/v1

components:
  schemas:
    User:
      type: object
      required:
        - id
        - email
        - fullname
        - display_name
        - email_verified
        - status
        - created_at
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        fullname:
          type: string
        display_name:
          type: string
        password_hashed:
          type: string
          nullable: true
        email_verified:
          type: boolean
        avatar_url:
          type: string
          format: uri
        status:
          type: string
          enum: [online, offline]
        timezone:
          type: string
          description: IANA timezone (e.g. Europe/Paris)
          example: Europe/Paris
        last_seen_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time

    Error:
      type: object
      properties:
        reason:
          type: string
          description: >-
            HTTP error or Free text such as  Database Not Available , Invalid
            Credential, Mandatory, Invalid Format,  Invalid Length,
            ForbiddenValue, Invalid Data,...
        code:
          type: string
          description: 'Error Id,  Server Application error ID, SQL error Id, ....'
        description:
          type: string
          description: Human-readable error description including Data and Value
      required:
        - reason

    SignupRequest:
      type: object
      required:
        - email
        - password
        - fullname
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
        fullname:
          type: string
        display_name:
          type: string

paths:
#  User Management
  /users/{id}:
    get:
      operationId: getUserById
      tags:
        - Users Management
      summary: Get user by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Invalid user ID format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /users/me:
    get:
      operationId: getCurrentUser
      tags:
        - Users Management
      summary: Get Current logged-in user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Invalid user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    put:
      operationId: setCurrentUser
      tags:
        - Users Management
      summary: Set current logged-in User Data
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Invalid user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      operationId: deleteCurrentUser
      tags:
        - Users Management
      summary: Delete current logged-in User Data
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Invalid user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /admin/users:
    get:
      operationId: getAllUsers
      tags:
        - Users Management
      summary: Get All Users [Only for admins]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
        '400':
          description: Something Is Invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

        '404':
          description: No Users are found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /admin/users/{id}:
    patch:
      operationId: setUserData
      tags:
        - Users Management
      summary: Set User Data Manually By Admin [For Admin only]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Something Is Invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

        '404':
          description: No Users are found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

#  Authentication Flow
#  POST   /auth/signup
#  POST   /auth/login
#  POST   /auth/logout
#  POST   /auth/refresh-token
#  POST   /auth/verify-email
#  POST   /auth/resend-verification
#  POST   /auth/forgot-password
#  POST   /auth/reset-password
#  POST   /auth/change-password
  /auth/signup:
    post:
      operationId: authSignup
      tags:
        - Authentication Flow
      summary: Create a new account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignupRequest'
      responses:
        '201':
          description: Account created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'

        '400':
          description: Invalid signup data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

        '409':
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
